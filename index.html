<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>我的时钟</title>
<style>
body{background:#000;color:#0f0;text-align:center;font-size:50px;padding-top:40%;font-family:monospace;}
</style>
</head>
<body>
<div id="time"></div>
<script>
setInterval(()=>{
let d=new Date();
document.getElementById("time").innerHTML=d.toLocaleTimeString();
},1000);
</script>
</body>
</html>
